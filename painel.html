<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Cozinha - FoodFlow</title>
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #004E89;
            --success: #2ECC71;
            --warning: #F39C12;
            --danger: #E74C3C;
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #eee;
            --text-secondary: #aaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--card);
            border-radius: 25px;
            padding: 35px 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            border: 2px solid #333;
            background: var(--bg);
            color: #fff;
            font-size: 1.3rem;
            text-align: center;
            letter-spacing: 10px;
        }

        .login-box .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }

        .dashboard {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }

        .dashboard-header {
            background: var(--card);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .live-badge {
            background: #1a3a1a;
            color: var(--success);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,100%{opacity:1;} 50%{opacity:0.2;}
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: var(--card);
            border-radius: 15px;
            padding: 18px;
            text-align: center;
            border-top: 3px solid transparent;
        }

        .stat-card:nth-child(1) { border-top-color: var(--warning); }
        .stat-card:nth-child(2) { border-top-color: var(--success); }
        .stat-card:nth-child(3) { border-top-color: #8e9eab; }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }
        .stat-card:nth-child(1) .stat-number { color: var(--warning); }
        .stat-card:nth-child(2) .stat-number { color: var(--success); }
        .stat-card:nth-child(3) .stat-number { color: #8e9eab; }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            background: var(--card);
            border-radius: 30px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 26px;
            background: transparent;
            color: #888;
            font-weight: 600;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid var(--warning);
        }

        .order-card.status-paid {
            border-left-color: var(--success);
            background: #162618;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%,100%{box-shadow:0 0 10px rgba(46,204,113,0.2);}
            50%{box-shadow:0 0 25px rgba(46,204,113,0.5);}
        }

        .order-card.status-delivered {
            border-left-color: #555;
            opacity: 0.6;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .order-status-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-paid {
            background: rgba(46,204,113,0.2);
            color: var(--success);
        }

        .order-items {
            font-size: 0.9rem;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 10px;
        }

        .order-total {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.3rem;
            display: block;
            text-align: right;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
        }

        .btn-deliver {
            background: var(--success);
            color: white;
        }

        .empty-orders {
            text-align: center;
            padding: 50px;
            color: #555;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="notificationSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <span style="font-size:3rem;">👨‍🍳</span>
            <h2>Painel da Cozinha</h2>
            <p style="color:#888;margin-bottom:20px;">Controle de pedidos</p>
            <input type="password" id="passwordInput" placeholder="Senha" maxlength="6">
            <button class="btn" onclick="login()">Entrar</button>
            <p id="errorMsg" style="color:var(--danger);margin-top:10px;display:none;">Senha incorreta!</p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1>🍽️ Pedidos <span class="live-badge"><span class="pulse-dot"></span> AO VIVO</span></h1>
            <div style="display:flex;gap:8px;">
                <button class="btn-refresh" onclick="carregarPedidos()" style="background:var(--secondary);border:none;color:white;padding:8px 16px;border-radius:20px;">🔄</button>
                <button class="btn-logout" onclick="logout()" style="background:transparent;border:2px solid #444;color:#ccc;padding:8px 16px;border-radius:20px;">🚪 Sair</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><span class="stat-number" id="countPaid">0</span><span class="stat-label">✅ Pagos</span></div>
            <div class="stat-card"><span class="stat-number" id="countDelivered">0</span><span class="stat-label">📦 Entregues</span></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('paid', this)">✅ Pagos</button>
            <button class="tab-btn" onclick="switchTab('delivered', this)">📦 Entregues</button>
        </div>

        <div class="orders-list" id="ordersList"></div>
    </div>

    <script>
        const STORAGE_KEYS = { ORDERS: 'evento_pedidos', CONFIG: 'configFeira' };
        let currentTab = 'paid';
        let lastOrdersCount = 0;

        function login() {
            const config = JSON.parse(localStorage.getItem(STORAGE_KEYS.CONFIG) || '{}');
            const senhaCorreta = config.painelPassword || '1234';
            const password = document.getElementById('passwordInput').value;
            
            if (password === senhaCorreta) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                carregarPedidos();
                setInterval(carregarPedidos, 4000);
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        function carregarPedidos() {
            const pedidos = JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS) || '[]');
            const pedidosPagos = pedidos.filter(p => p.status === 'paid');
            const pedidosEntregues = pedidos.filter(p => p.status === 'delivered');
            
            const novoCount = pedidosPagos.length;
            if (novoCount > lastOrdersCount && lastOrdersCount > 0) {
                const audio = document.getElementById('notificationSound');
                audio.play().catch(e => console.log('Audio não reproduzido'));
                if (navigator.vibrate) navigator.vibrate(500);
            }
            lastOrdersCount = novoCount;
            
            document.getElementById('countPaid').textContent = pedidosPagos.length;
            document.getElementById('countDelivered').textContent = pedidosEntregues.length;
            
            const filtrados = pedidos.filter(p => p.status === currentTab);
            filtrados.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            renderizarPedidos(filtrados);
        }

        function renderizarPedidos(pedidos) {
            const container = document.getElementById('ordersList');
            
            if (pedidos.length === 0) {
                container.innerHTML = `<div class="empty-orders"><span style="font-size:3rem;">📭</span><p>Nenhum pedido ${currentTab === 'paid' ? 'para preparar' : 'entregue'}</p></div>`;
                return;
            }
            
            container.innerHTML = pedidos.map(pedido => `
                <div class="order-card status-${pedido.status}">
                    <div class="order-header">
                        <div><strong>${pedido.orderId}</strong> • ${pedido.customerName}</div>
                        <span class="order-status-badge badge-paid">${pedido.status === 'paid' ? '💰 PAGO' : '📦 ENTREGUE'}</span>
                    </div>
                    <div class="order-items">
                        ${pedido.items.map(i => `<div>${i.emoji || '🍽️'} ${i.qty}x ${i.name} — R$ ${(i.price * i.qty).toFixed(2)}</div>`).join('')}
                    </div>
                    <div class="order-total">💰 R$ ${pedido.total.toFixed(2)}</div>
                    <div style="font-size:11px;color:#666;margin-top:8px;">🕐 ${new Date(pedido.createdAt).toLocaleString()}</div>
                    ${pedido.status === 'paid' ? `<button class="btn-action btn-deliver" onclick="marcarEntregue('${pedido.orderId}')">📦 Marcar como Entregue</button>` : ''}
                </div>
            `).join('');
        }

        function marcarEntregue(orderId) {
            const pedidos = JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS) || '[]');
            const index = pedidos.findIndex(p => p.orderId === orderId);
            if (index !== -1) {
                pedidos[index].status = 'delivered';
                pedidos[index].deliveredAt = new Date().toISOString();
                localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(pedidos));
                carregarPedidos();
                if (navigator.vibrate) navigator.vibrate(200);
            }
        }

        function switchTab(tab, element) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            carregarPedidos();
        }

        window.addEventListener('storage', () => carregarPedidos());
        document.getElementById('passwordInput').addEventListener('keypress', e => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
